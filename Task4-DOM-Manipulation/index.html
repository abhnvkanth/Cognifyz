<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillHub | Registration Portal</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Theme Toggle -->
    <button id="themeToggle" class="theme-btn">
        <i class="bi bi-moon-stars-fill"></i>
    </button>

    <!-- Home Section -->
    <section id="homePage" class="page active-page">

        <div class="container d-flex justify-content-center align-items-center min-vh-100">

            <div class="register-card">

                <div class="text-center mb-4">

                    <div class="logo">
                        <i class="bi bi-person-circle"></i>
                    </div>

                    <h2>Create Your Account</h2>

                    <p class="text-muted">
                        Register to join SkillHub
                    </p>

                </div>

                <form id="registerForm">

                    <!-- Name -->

                    <div class="mb-3">

                        <label class="form-label">Full Name</label>

                        <input
                            type="text"
                            id="name"
                            class="form-control"
                            placeholder="John Doe">

                        <small id="namePreview"></small>

                    </div>

                    <!-- Email -->

                    <div class="mb-3">

                        <label class="form-label">Email Address</label>

                        <input
                            type="email"
                            id="email"
                            class="form-control"
                            placeholder="john@example.com">

                        <small id="emailMessage"></small>

                    </div>

                    <!-- Password -->

                    <div class="mb-3">

                        <label class="form-label">Password</label>

                        <div class="input-group">

                            <input
                                type="password"
                                id="password"
                                class="form-control"
                                placeholder="Create Password">

                            <button
                                type="button"
                                class="btn btn-outline-secondary"
                                id="togglePassword">

                                <i class="bi bi-eye-fill"></i>

                            </button>

                        </div>

                        <div class="strength">

                            <div id="strengthBar"></div>

                        </div>

                        <small id="strengthText"></small>

                    </div>

                    <!-- Confirm Password -->

                    <div class="mb-3">

                        <label class="form-label">
                            Confirm Password
                        </label>

                        <input
                            type="password"
                            id="confirmPassword"
                            class="form-control"
                            placeholder="Confirm Password">

                        <small id="confirmMessage"></small>

                    </div>

                    <!-- Country -->

                    <div class="mb-3">

                        <label class="form-label">
                            Country
                        </label>

                        <select
                            id="country"
                            class="form-select">

                            <option value="">Select Country</option>

                            <option>Nepal</option>

                            <option>India</option>

                            <option>USA</option>

                            <option>Australia</option>

                            <option>Canada</option>

                        </select>

                    </div>

                    <!-- Bio -->

                    <div class="mb-3">

                        <label class="form-label">
                            Short Bio
                        </label>

                        <textarea
                            id="bio"
                            rows="4"
                            maxlength="150"
                            class="form-control"
                            placeholder="Tell us about yourself..."></textarea>

                        <div class="text-end">

                            <small>

                                <span id="charCount">0</span>/150

                            </small>

                        </div>

                    </div>

                    <!-- Terms -->

                    <div class="form-check mb-4">

                        <input
                            class="form-check-input"
                            type="checkbox"
                            id="terms">

                        <label class="form-check-label">

                            I agree to the Terms & Conditions

                        </label>

                    </div>

                    <button
                        type="submit"
                        class="btn btn-primary w-100 register-btn">

                        <i class="bi bi-person-plus-fill"></i>

                        Register

                    </button>

                </form>

            </div>

        </div>

    </section>

    <!-- Success Section -->

    <section id="successPage" class="page">

        <div class="container d-flex justify-content-center align-items-center min-vh-100">

            <div class="success-card text-center">

                <div class="success-icon">

                    <i class="bi bi-check-circle-fill"></i>

                </div>

                <h2>

                    Registration Successful!

                </h2>

                <p>

                    Welcome,

                    <span id="displayName"></span>

                </p>

                <button
                    id="backBtn"
                    class="btn btn-success">

                    Register Another User

                </button>

            </div>

        </div>

    </section>

    <script src="js/script.js"></script>

</body>

</html>
